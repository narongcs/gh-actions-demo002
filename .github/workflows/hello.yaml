name: Hello World
on: 
  push:
    branches: [main]
    paths-ignore:
      - ".github/workflows/*.yaml"
  pull_request:
    branches: [main]
    
  repository_dispatch:
    types: ["on-demand-test"]
    # inputs:      
    #   types: ['after_render_cms'] 
jobs:
  hello-job:
    runs-on: ubuntu-latest
    steps:
      - name: Run a one-line
        run: echo "Hello Github Actions!"

  Seccond-job:
    runs-on: windows-latest
    needs: hello-job
    steps:
      - run: echo "This job is running on ${{ runner.os }}"
